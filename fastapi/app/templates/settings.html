{% extends "base.html" %}
{% block content %}
<h1>{{ t.settings_heading }}</h1>

{% if saved %}
<div class="notice">{{ t.saved_message }}</div>
{% endif %}

<form class="settings-form" method="post" action="/settings">
    <label>
        <span>{{ t.theme_label }}</span>
        <select name="theme">
            <option value="dark"  {% if theme == 'dark' %}selected{% endif %}>{{ t.theme_dark }}</option>
            <option value="light" {% if theme == 'light' %}selected{% endif %}>{{ t.theme_light }}</option>
            <option value="auto"  {% if theme == 'auto' %}selected{% endif %}>{{ t.theme_auto }}</option>
        </select>
    </label>

    <label>
        <span>{{ t.language_label }}</span>
        <select name="language">
            {% for code in available_languages %}
            <option value="{{ code }}" {% if language == code %}selected{% endif %}>{{ t['lang_' ~ code] }}</option>
            {% endfor %}
        </select>
    </label>

    <button type="submit"><span>{{ t.save_button }}</span></button>
</form>

<h2>{{ t.specs_heading }}</h2>
<table class="specs">
    <tr><td>{{ t.version_label }}</td><td>{{ app_version }}</td></tr>
    <tr><td>{{ t.max_length_label }}</td><td>{{ max_length }}</td></tr>
    <tr><td>{{ t.language_name }}</td><td>{{ t['lang_' ~ language] }}</td></tr>
</table>
{% endblock %}
